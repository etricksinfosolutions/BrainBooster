name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install --no-audit --no-fund
      # --- Quality gates (no merge unless these pass) ---------------------
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit, integration & Level-Validation-Engine tests
        run: npx vitest run
      - name: Build
        run: npm run build
      - name: Asset validation (coverage, collisions, duplicates, placeholders)
        # Advisory in CI so an in-progress sprite bake doesn't block PRs; the
        # RELEASE path (npm run build:prod / android:sync) runs this STRICT and
        # fails if the premium pack is incomplete. Collisions / banned
        # placeholders still surface here on every PR.
        run: npm run validate:assets:advisory
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Syntax check
        run: node --check src/index.js

  docker:
    runs-on: ubuntu-latest
    needs: [web, api]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
