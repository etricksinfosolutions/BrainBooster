# Builds the Brain Booster Kids Android app (Capacitor) and uploads the APK.
# Run it from the GitHub "Actions" tab (workflow_dispatch) or on every push.
name: Android build

on:
  push:
    branches: [main, master]
    paths: ['apps/web/**', '.github/workflows/android.yml']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Build debug APK
        run: chmod +x android/gradlew && cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brain-booster-kids-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
