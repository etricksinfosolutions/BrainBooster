# The 5 stateless microservices. Same shape; differ only in name/image/port.
# Rendered explicitly (no templating engine assumed) so `kubectl apply -f` just works.
apiVersion: apps/v1
kind: Deployment
metadata: { name: content-service, namespace: brainbooster }
spec:
  replicas: 2
  selector: { matchLabels: { app: content-service } }
  template:
    metadata: { labels: { app: content-service } }
    spec:
      containers:
        - name: content-service
          image: ghcr.io/brainbooster/content-service:latest
          ports: [{ containerPort: 4101 }]
          env: [{ name: PORT, value: "4101" }]
          readinessProbe: { httpGet: { path: /health, port: 4101 } }
---
apiVersion: v1
kind: Service
metadata: { name: content-service, namespace: brainbooster }
spec: { selector: { app: content-service }, ports: [{ port: 80, targetPort: 4101 }] }
---
