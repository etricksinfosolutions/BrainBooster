apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brainbooster
  namespace: brainbooster
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: brainbooster.example.com
      http:
        paths:
          - { path: /api, pathType: Prefix, backend: { service: { name: api, port: { number: 80 } } } }
          - { path: /content, pathType: Prefix, backend: { service: { name: content-service, port: { number: 80 } } } }
          - { path: /leaderboard, pathType: Prefix, backend: { service: { name: leaderboard-service, port: { number: 80 } } } }
          - { path: /analytics, pathType: Prefix, backend: { service: { name: analytics-service, port: { number: 80 } } } }
          - { path: /recommend, pathType: Prefix, backend: { service: { name: recommendation-service, port: { number: 80 } } } }
          - { path: /notify, pathType: Prefix, backend: { service: { name: notification-service, port: { number: 80 } } } }
